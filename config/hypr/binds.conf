$mainMod = SUPER
$scripts = ~/.config/hypr/scripts

bindl = , switch:Lid Switch,  exec,  swaylock
#bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1,  1920x1080,  0x0,  1"
#bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1,  disable"

bind  = $mainMod, 1, workspace, 1
bind  = $mainMod, 2, workspace, 2
bind  = $mainMod, 3, workspace, 3
bind  = $mainMod, 4, workspace, 4
bind  = $mainMod, 5, workspace, 5
bind  = $mainMod, 6, workspace, 6
bind  = $mainMod, 7, workspace, 7
bind  = $mainMod, 8, workspace, 8
bind  = $mainMod, 9, workspace, 9
bind  = $mainMod, 0, workspace, 10

bind  = $mainMod SHIFT, 1, movetoworkspace, 1
bind  = $mainMod SHIFT, 2, movetoworkspace, 2
bind  = $mainMod SHIFT, 3, movetoworkspace, 3
bind  = $mainMod SHIFT, 4, movetoworkspace, 4
bind  = $mainMod SHIFT, 5, movetoworkspace, 5
bind  = $mainMod SHIFT, 6, movetoworkspace, 6
bind  = $mainMod SHIFT, 7, movetoworkspace, 7
bind  = $mainMod SHIFT, 8, movetoworkspace, 8
bind  = $mainMod SHIFT, 9, movetoworkspace, 9
bind  = $mainMod SHIFT, 0, movetoworkspace, 10

bind  = $mainMod CONTROL, 1, togglespecialworkspace, 1
bind  = $mainMod CONTROL, 2, togglespecialworkspace, 2
bind  = $mainMod CONTROL, 3, togglespecialworkspace, 3
bind  = $mainMod CONTROL, 4, togglespecialworkspace, 4
bind  = $mainMod CONTROL, 5, togglespecialworkspace, 5
bind  = $mainMod CONTROL, 6, togglespecialworkspace, 6
bind  = $mainMod CONTROL, 7, togglespecialworkspace, 7
bind  = $mainMod CONTROL, 8, togglespecialworkspace, 8
bind  = $mainMod CONTROL, 9, togglespecialworkspace, 9
bind  = $mainMod CONTROL, 0, togglespecialworkspace, 10

bind  = $mainMod CONTROL SHIFT, 1, movetoworkspacesilent, special:1
bind  = $mainMod CONTROL SHIFT, 2, movetoworkspacesilent, special:2
bind  = $mainMod CONTROL SHIFT, 3, movetoworkspacesilent, special:3
bind  = $mainMod CONTROL SHIFT, 4, movetoworkspacesilent, special:4
bind  = $mainMod CONTROL SHIFT, 5, movetoworkspacesilent, special:5
bind  = $mainMod CONTROL SHIFT, 6, movetoworkspacesilent, special:6
bind  = $mainMod CONTROL SHIFT, 7, movetoworkspacesilent, special:7
bind  = $mainMod CONTROL SHIFT, 8, movetoworkspacesilent, special:8
bind  = $mainMod CONTROL SHIFT, 9, movetoworkspacesilent, special:9
bind  = $mainMod CONTROL SHIFT, 0, movetoworkspacesilent, special:10

bind  = $mainMod, A, exec, $scripts/scratchpad.sh term
bind  = $mainMod, C, exec, $scripts/color-picker.sh
bind  = $mainMod, D, exec, eww open-many --toggle bar date
bind  = $mainMod, E, exec, nautilus
bind  = $mainMod, F, fullscreen, 
bind  = $mainMod, G, togglegroup
bind  = $mainMod, H, movefocus, l
bind  = $mainMod, I, fullscreen, 1
bind  = $mainMod, J, movefocus, d
bind  = $mainMod, k, movefocus, u
bind  = $mainMod, L, movefocus, r
bind  = $mainMod, M, togglespecialworkspace, music
bind  = $mainMod, N, exec, $scripts/scratchpad_tgpt.sh
bind  = $mainMod, O, exec, kitty --single-instance lf
bind  = $mainMod, Q, killactive, 
bind  = $mainMod, R, exec, wofi -W 50% -H 75% --location 2 -w 3 -i --gtk-dark --show drun
bind  = $mainMod, S, exec,[size 1790 900;float;move 60 40;pin] kitty ~/.local/bin/opn hyp
bind  = $mainMod, T, togglefloating, active
bind  = $mainMod, W, exec, firefox
bind  = $mainMod, X, exec, zsh -c "$scripts/yt.sh"
bind  = $mainMod, right, workspace, e+1
bind  = $mainMod, left, workspace, e-1
bind  = $mainMod, up, fullscreen, 0
bind  = $mainMod, down, fullscreen, 1
bind  = $mainMod, Return, exec, kitty --single-instance
bind  = $mainMod, Print, exec, grim - | wl-copy && notify-send 'Screenshot Copied to Clipboard'
bind  = $mainMod, tab, changegroupactive, f
bind  = $mainMod, Space, exec, $scripts/open_launcher.sh
bind  = $mainMod, bracketleft, changegroupactive, b
bind  = $mainMod, bracketright, changegroupactive, f
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind  = $mainMod SHIFT, A, exec, $scripts/scratchpad.sh
bind  = $mainMod SHIFT, F, togglefloating
bind  = $mainMod SHIFT, H, movewindow, l
bind  = $mainMod SHIFT, J, movewindow, d
bind  = $mainMod SHIFT, K, movewindow, u
bind  = $mainMod SHIFT, L, movewindow, r
bind  = $mainMod SHIFT, M, exec, $scripts/scratchpad_music.sh
bind  = $mainMod SHIFT, Q, exec, pkill Hyprland
bind  = $mainMod SHIFT, R, exec, hyprctl reload
bind  = $mainMod SHIFT, W, exec, [fullscreen 1]firefox --private-window "https://www.youtube.com" #/@HT-Videos/videos"
bind  = $mainMod SHIFT, left, movetoworkspacesilent, -1
bind  = $mainMod SHIFT, right, movetoworkspacesilent, +1
bind  = $mainMod SHIFT, Return, exec, foot

bind  = $mainMod CONTROL, Q, exec, hyprctl kill
bind  = $mainMod CONTROL, W, fakefullscreen, 
binde = $mainMod CONTROL, h, resizeactive, -10 0
binde = $mainMod CONTROL, l, resizeactive, 10 0
binde = $mainMod CONTROL, k , resizeactive, 0 -10
binde = $mainMod CONTROL, j, resizeactive, 0 10
bind  = $mainMod CONTROL,  left, movetoworkspace, -1
bind  = $mainMod CONTROL, right, movetoworkspace, +1

bind  = $mainMod ALT, left, workspace, -1 
bind  = $mainMod ALT, right, workspace, +1
binde = $mainMod ALT, h, splitratio, -0.1
binde = $mainMod ALT, l, splitratio, +0.1
binde = $mainMod ALT, Return, exec, wezterm

bind  = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_SINK@ 5%+
bind  = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bind  = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind  = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind  = , XF86AudioMedia, exec, playerctl play-pause
bind  = , XF86AudioPlay, exec, playerctl play-pause
bind  = , XF86AudioStop, exec, playerctl stop
bind  = , XF86AudioPrev, exec, playerctl previous
bind  = , XF86AudioNext, exec, playerctl next
bind  = , Print, exec, grim $(xdg-user-dir PICTURES)/Screenshots/$(date +'%Y%m%d%H%M%S_1.png') && notify-send 'Screenshot Saved'
